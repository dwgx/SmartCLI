# Dependabot keeps dependencies + GitHub Actions pinned versions fresh.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Python runtime deps declared in pyproject.toml / requirements*.txt.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "deps"

  # The action versions used in .github/workflows/*.yml (actions/checkout, etc.).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci"
