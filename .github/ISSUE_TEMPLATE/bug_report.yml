name: Bug report
description: Something in SmartCLI (core, cmd-art, drive-tui, or tui-ui) misbehaves.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough for a maintainer to reproduce
        it — SmartCLI is a terminal/PTY project, so the OS and terminal matter a lot.
  - type: input
    id: version
    attributes:
      label: SmartCLI version
      description: "`pip show smartcli-toolkit`, or the git commit."
      placeholder: "0.1.3"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS / terminal
      options:
        - Windows (Windows Terminal + ConPTY)
        - Windows (other terminal)
        - Linux
        - macOS
        - Other (say in description)
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.x"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - smartcli_core (PTY / screen model / readiness)
        - drive-tui (driving TUIs / recipes / tui.py)
        - cmd-art (fx effects)
        - tui-ui (layout engine / widgets)
        - docs / packaging
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you did, what you expected, what you got. Include the exact command and any traceback.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest snippet or step list that triggers it. Screen snapshots (`tui.py snapshot`) help.
