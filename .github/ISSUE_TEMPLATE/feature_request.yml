name: Feature request
description: Suggest a new effect, recipe, widget, or capability.
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - cmd-art (a new fx effect)
        - drive-tui (a new recipe / driving capability)
        - tui-ui (a new widget / layout feature)
        - smartcli_core (PTY / perception)
        - packaging / distribution
        - docs
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case, not just the feature. What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Optional. If you have an idea of how it should work or look.
