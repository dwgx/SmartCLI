name: Docker (GHCR)

# Build and publish the container image to GitHub Container Registry using the
# workflow's built-in GITHUB_TOKEN — no user-provided secret or extra PAT scope
# is needed (packages: write is granted per-job below). Pushes on main and on
# version tags; PRs build only (no push) so a fork PR can't publish.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "smartcli_core/**"
      - "skills/**"
      - ".github/workflows/docker.yml"
  pull_request:
    # Mirror the push paths so a PR that breaks the image via a core/skill change
    # (e.g. a bad import the fx/ui/drive entrypoint hits) gets caught by the
    # build-only PR gate, not only after merge.
    paths:
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "smartcli_core/**"
      - "skills/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/smartcli

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        # The default docker driver can't export a gha cache; buildx's
        # docker-container driver can. Required for the cache-to/from below.
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip login (and push) on pull_request — the token is read-only there.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
