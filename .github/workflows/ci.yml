name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # Deterministic, non-interactive checks across all three OSes. Windows matches
  # the primary dev/target environment (ConPTY via pywinpty); Linux + macOS
  # exercise the stdlib POSIX pty backend that was previously only hand-verified
  # over SSH. The interactive drive-tui PTY probes and the effort_selector path
  # need a live TTY and are flaky/hang-prone under CI, so they stay excluded here
  # — the POSIX backend sandbox below covers the pty code path deterministically.
  tests:
    name: ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: fx regression (verify_fx)
        run: python tests/verify_fx.py

      # Crown-jewel DETERMINISTIC gates — pure/in-memory, no PTY spawn, so they
      # run reliably on every OS and now gate every PR (previously these
      # mutation-proof / contract / fuzz suites weren't wired into CI at all).
      - name: fx frame contract (19 effects x sizes)
        run: python tests/test_fx_contract.py

      - name: readiness virtual-clock + blank-gate locks
        run: python tests/test_readiness.py

      - name: degenerate-input regression locks
        run: python tests/test_degenerate_inputs.py

      - name: pure-memory fuzz sandbox (perception chain)
        run: python tests/_sandbox_fuzz_core.py

      - name: drive-tui vendored core == canonical
        run: python tests/test_vendor_sync.py

      - name: doc counts match code (anti-drift, fx 18->19 guard)
        run: python tests/test_doc_counts.py

      - name: README literal import-order check
        run: python tests/_readme_literal.py

      - name: tui-ui self test
        working-directory: skills/tui-ui
        run: python self_test.py

      - name: cmd-art effect catalog renders
        working-directory: skills/cmd-art
        run: python -m fx list

      - name: tui-ui widget catalog renders
        working-directory: skills/tui-ui
        run: python -m ui widgets

      # POSIX-only: the stdlib pty.fork() backend + perceive stack + the two
      # recorded POSIX fixes (#5 SS3 arrows, #6 zombie reap). This is the code
      # path that was previously only hand-verified on Debian over SSH; running
      # it on ubuntu + macos keeps it green automatically and finally covers the
      # macOS BSD-pty EOF path.
      - name: POSIX pty backend sandbox
        if: runner.os != 'Windows'
        run: python tests/_sandbox_posix_backend.py
