# Publish smartcli-toolkit to PyPI via Trusted Publishing (OIDC).
#
# ---------------------------------------------------------------------------
# ONE-TIME MANUAL SETUP (a human must do this ONCE, before the first tag push):
#
# This workflow uses PyPI Trusted Publishing (OpenID Connect). There is NO API
# token and NO password anywhere — GitHub mints a short-lived OIDC identity and
# PyPI verifies it against a Trusted Publisher you register. That is what fixes
# the token-leak risk: there is no long-lived secret to leak.
#
# Register the Trusted Publisher on PyPI:
#   1. Sign in to PyPI as an owner of the project.
#   2. Go to:
#        https://pypi.org/manage/project/smartcli-toolkit/settings/publishing/
#   3. Under "Add a new publisher" -> "GitHub", enter EXACTLY:
#        PyPI Project Name: smartcli-toolkit
#        Owner:             dwgx
#        Repository name:   SmartCLI
#        Workflow name:     publish.yml
#        Environment name:  pypi
#   4. Save.
#
# Also create the GitHub environment named `pypi` (repo Settings -> Environments)
# so the `environment: pypi` reference below resolves. It needs no secrets; you
# may optionally add required reviewers to gate releases.
#
# After setup, releasing is: bump the version in pyproject.toml, commit, then
#   git tag v0.1.1 && git push origin v0.1.1
# The tag push triggers this workflow, which builds and publishes automatically.
# ---------------------------------------------------------------------------

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    # Guard: this workflow publishes to PRODUCTION PyPI. Its trigger `tags: v*`
    # also matches prerelease tags (v0.1.3rc1 / v0.1.3a1 / v0.1.3b2), which the
    # SEPARATE publish-testpypi.yml is meant to handle. GitHub tag patterns are
    # globs, not regex, so we can't exclude prereleases in the `on:` filter —
    # skip them here instead, so a rehearsal tag goes to TestPyPI ONLY and never
    # silently burns a version string on the real index. workflow_dispatch (no
    # prerelease ref) always runs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!contains(github.ref_name, 'rc') &&
       !contains(github.ref_name, 'a') &&
       !contains(github.ref_name, 'b'))
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (Trusted Publishing / OIDC)
    needs: build
    runs-on: ubuntu-latest
    # `id-token: write` is REQUIRED so GitHub can mint the OIDC token that PyPI
    # verifies against the registered Trusted Publisher. No other secret is used.
    permissions:
      id-token: write
    environment: pypi
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        # No username/password/token: authentication is handled entirely by OIDC
        # Trusted Publishing (see the one-time setup comment at the top).
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Skip files already on PyPI instead of erroring. This makes a
          # workflow_dispatch re-run on an already-published version succeed
          # (it verifies the OIDC handshake without failing on duplicate files),
          # and is harmless for a real release (a new version's files don't exist
          # yet, so nothing is skipped).
          skip-existing: true
