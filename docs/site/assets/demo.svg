<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 665 298"
     width="665" height="298" role="img"
     aria-label="SmartCLI drive-tui demo: an AI perceiving and driving the grok TUI">

  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8a55a"/>
      <stop offset="50%" stop-color="#cc785c"/>
      <stop offset="100%" stop-color="#cc785c"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="665" height="298" rx="12" fill="#181715"/>
  <rect x="1.5" y="1.5" width="662" height="295" rx="11"
        fill="none" stroke="url(#border)" stroke-width="2" opacity="0.9"/>
  <rect x="0" y="0" width="665" height="34" rx="12" fill="#252320"/>
  <rect x="0" y="22" width="665" height="12" fill="#252320"/>
  <circle cx="20" cy="17" r="5.5" fill="#e06c60"/>
  <circle cx="40" cy="17" r="5.5" fill="#e8a55a"/>
  <circle cx="60" cy="17" r="5.5" fill="#5db872"/>
  <text x="332.5" y="21" text-anchor="middle" font-family="monospace"
        font-size="12" fill="#8e8b82">SmartCLI · drive-tui — grok</text>

  <rect x="0" y="0" width="665" height="46" fill="url(#scan)" opacity="0.6"><animate attributeName="y" values="34;298;34" dur="15.0s" repeatCount="indefinite"/></rect>
  <g opacity="1">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.0000;0.0233;0.1767;0.2000;1" dur="15.0s" repeatCount="indefinite" calcMode="linear"/>
      <text x="22" y="56" font-family="monospace" font-size="14.5" font-weight="700" fill="#5db8a6">▸ A human tells the AI what to do</text>
      <rect x="22" y="64" width="611.6" height="1.4" fill="#cc785c" opacity="0.45"/>
      <text x="22" y="88" font-family="monospace" font-size="13.5" font-weight="700" fill="#5db8a6" xml:space="preserve">$ ai&gt; drive grok, say hi, switch to the lowest tier</text>
      <text x="22" y="107" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve"></text>
      <text x="22" y="126" font-family="monospace" font-size="13.5" font-weight="400" fill="#8e8b82" xml:space="preserve">  the AI is about to open a fullscreen TUI it cannot</text>
      <text x="22" y="145" font-family="monospace" font-size="13.5" font-weight="400" fill="#8e8b82" xml:space="preserve">  see through a normal pipe — no menus, no arrows,</text>
      <text x="22" y="164" font-family="monospace" font-size="13.5" font-weight="400" fill="#8e8b82" xml:space="preserve">  no cursor. a plain subprocess just hangs or prints</text>
      <text x="22" y="183" font-family="monospace" font-size="13.5" font-weight="400" fill="#8e8b82" xml:space="preserve">  nothing.</text>
      <text x="22" y="202" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve"></text>
      <text x="22" y="221" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve">  drive-tui gives the AI eyes and hands:</text>
      <text x="22" y="240" font-family="monospace" font-size="13.5" font-weight="700" fill="#cc785c" xml:space="preserve">  perceive → decide → act → wait → confirm.</text>
  </g>
  <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2000;0.2233;0.3767;0.4000;1" dur="15.0s" repeatCount="indefinite" calcMode="linear"/>
      <text x="22" y="56" font-family="monospace" font-size="14.5" font-weight="700" fill="#5db8a6">▸ perceive  →  a semantic snapshot of the live screen</text>
      <rect x="22" y="64" width="611.6" height="1.4" fill="#cc785c" opacity="0.45"/>
      <text x="22" y="88" font-family="monospace" font-size="13.5" font-weight="400" fill="#8e8b82" xml:space="preserve">[screen 30x100] cursor=r25c6  title=&quot;grok&quot;  [stable]</text>
      <text x="22" y="107" font-family="monospace" font-size="13.5" font-weight="400" fill="#cc785c" xml:space="preserve">  ╭────────────────────────────────────────╮</text>
      <text x="22" y="126" font-family="monospace" font-size="13.5" font-weight="400" fill="#cc785c" xml:space="preserve">  │  Grok Build Beta  0.2.99               │</text>
      <text x="22" y="145" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve">  │  Grok 4.5 is here!                     │</text>
      <text x="22" y="164" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve">  │  New worktree                    ctrl+w│</text>
      <text x="22" y="183" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve">  │  Resume session                  ctrl+s│</text>
      <text x="22" y="202" font-family="monospace" font-size="13.5" font-weight="400" fill="#cc785c" xml:space="preserve">  ╰────────────────────────────────────────╯</text>
      <text x="22" y="221" font-family="monospace" font-size="13.5" font-weight="400" fill="#5db8a6" xml:space="preserve">  ❯ _</text>
      <text x="22" y="240" font-family="monospace" font-size="13.5" font-weight="400" fill="#cc785c" xml:space="preserve">  Grok 4.5 (high) · always-approve</text>
  </g>
  <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.4000;0.4233;0.5767;0.6000;1" dur="15.0s" repeatCount="indefinite" calcMode="linear"/>
      <text x="22" y="56" font-family="monospace" font-size="14.5" font-weight="700" fill="#5db8a6">▸ act  →  type 你好 and read the reply</text>
      <rect x="22" y="64" width="611.6" height="1.4" fill="#cc785c" opacity="0.45"/>
      <text x="22" y="88" font-family="monospace" font-size="13.5" font-weight="700" fill="#5db8a6" xml:space="preserve">  ❯ 你好                                  9:36 AM</text>
      <text x="22" y="107" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve"></text>
      <text x="22" y="126" font-family="monospace" font-size="13.5" font-weight="400" fill="#8e8b82" xml:space="preserve">  ◆ Thought for 0.1s</text>
      <text x="22" y="145" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve">  你好！我是 Grok，可以帮你处理 SmartCLI 项目里的</text>
      <text x="22" y="164" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve">  开发任务，比如写代码、查 bug、跑测试。</text>
      <text x="22" y="183" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve">  今天想做什么？</text>
      <text x="22" y="202" font-family="monospace" font-size="13.5" font-weight="400" fill="#8e8b82" xml:space="preserve">  Worked for 2.0s.</text>
      <text x="22" y="221" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve"></text>
      <text x="22" y="240" font-family="monospace" font-size="13.5" font-weight="400" fill="#cc785c" xml:space="preserve">  Grok 4.5 (high) · always-approve</text>
  </g>
  <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.6000;0.6233;0.7767;0.8000;1" dur="15.0s" repeatCount="indefinite" calcMode="linear"/>
      <text x="22" y="56" font-family="monospace" font-size="14.5" font-weight="700" fill="#5db8a6">▸ act  →  arrow keys navigate the /model picker</text>
      <rect x="22" y="64" width="611.6" height="1.4" fill="#cc785c" opacity="0.45"/>
      <text x="22" y="88" font-family="monospace" font-size="13.5" font-weight="400" fill="#8e8b82" xml:space="preserve">  /model  ──  choose model, then effort</text>
      <text x="22" y="107" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve"></text>
      <text x="22" y="126" font-family="monospace" font-size="13.5" font-weight="400" fill="#8e8b82" xml:space="preserve">    High Effort (active)   extensive reasoning</text>
      <text x="22" y="145" font-family="monospace" font-size="13.5" font-weight="400" fill="#8e8b82" xml:space="preserve">    Medium Effort          balanced</text>
      <text x="22" y="164" font-family="monospace" font-size="13.5" font-weight="700" fill="#5db8a6" xml:space="preserve">  ❯ Low Effort              quick, fast</text>
      <text x="22" y="183" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve"></text>
      <text x="22" y="202" font-family="monospace" font-size="13.5" font-weight="400" fill="#5db872" xml:space="preserve">  keys: Down Down → highlight moved to Low  ✓</text>
      <text x="22" y="221" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve"></text>
      <text x="22" y="240" font-family="monospace" font-size="13.5" font-weight="400" fill="#cc785c" xml:space="preserve">  Grok 4.5 (high) · always-approve</text>
  </g>
  <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.8000;0.8233;0.9767;1.0000;1" dur="15.0s" repeatCount="indefinite" calcMode="linear"/>
      <text x="22" y="56" font-family="monospace" font-size="14.5" font-weight="700" fill="#5db8a6">▸ confirm  →  the tier actually changed</text>
      <rect x="22" y="64" width="611.6" height="1.4" fill="#cc785c" opacity="0.45"/>
      <text x="22" y="88" font-family="monospace" font-size="13.5" font-weight="700" fill="#5db8a6" xml:space="preserve">  ❯ 你好                                  9:38 AM</text>
      <text x="22" y="107" font-family="monospace" font-size="13.5" font-weight="400" fill="#8e8b82" xml:space="preserve">  ◆ Thought for 0.0s</text>
      <text x="22" y="126" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve">  你好！有什么需要帮忙的吗？</text>
      <text x="22" y="145" font-family="monospace" font-size="13.5" font-weight="400" fill="#8e8b82" xml:space="preserve">  Worked for 1.5s.</text>
      <text x="22" y="164" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve"></text>
      <text x="22" y="183" font-family="monospace" font-size="13.5" font-weight="700" fill="#5db872" xml:space="preserve">  Grok 4.5 (low) · always-approve            ✓</text>
      <text x="22" y="202" font-family="monospace" font-size="13.5" font-weight="400" fill="#faf9f5" xml:space="preserve"></text>
      <text x="22" y="221" font-family="monospace" font-size="13.5" font-weight="700" fill="#cc785c" xml:space="preserve">  perceive → decide → act → wait → confirm</text>
      <text x="22" y="240" font-family="monospace" font-size="13.5" font-weight="400" fill="#8e8b82" xml:space="preserve">  driven like a human. never a blind sleep.</text>
  </g>
</svg>
